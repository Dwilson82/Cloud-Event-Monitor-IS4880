<!DOCTYPE html>
<html>
<head>
    <title>CloudEvent Monitor Dashboard</title>
</head>

<body>

    <h1>CloudEvent Monitor Dashboard</h1>

    <h2>Producer (Tkinter)</h2>
    <p>Last Temperature Sent: --</p>
    <p>Last Message ID: --</p>

    <h2>Consumer</h2>
    <p>Last Message Received: --</p>
    <p>Duplicate: --</p>

    <h2>Message History</h2>
    <table border="1">
        <tr>
            <th>Message ID</th>
            <th>Temperature</th>
            <th>Timestamp</th>
        </tr>

        <tr>
            <td>Example</td>
            <td>22.5 C</td>
            <td>2026-01-01</td>
        </tr>

    </table>

</body>
</html>
